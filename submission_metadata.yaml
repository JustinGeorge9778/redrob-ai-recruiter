# ============================================================

# METHODOLOGY SUMMARY

# ============================================================

methodology_summary: |
Multi-stage AI recruitment system consisting of:

1. Job Description Understanding

   * Skill extraction
   * Requirement analysis
   * Domain signal detection
   * Culture and hiring signal extraction

2. Semantic Candidate Retrieval

   * SentenceTransformer embeddings
   * FAISS vector search
   * Top candidate retrieval from large candidate pool

3. Multi-Dimensional Candidate Scoring

   * Skill Match (25%)
   * Title / Headline Match (18%)
   * Experience Quality (15%)
   * Career Trajectory (12%)
   * Behavioral Signals (15%)
   * Education (5%)
   * Location / Culture Fit (5%)
   * Honeypot Detection (5%)

4. Cross-Encoder Re-ranking

   * Deep semantic relevance scoring
   * Candidate re-ordering

5. Ensemble Ranking

   * Initial Score (30%)
   * Cross-Encoder Score (35%)
   * Behavioral Score (10%)
   * Skill Match Score (15%)
   * Experience Quality Score (10%)

6. Explainable AI

   * Human-readable reasoning generation
   * Recruiter-friendly recommendations

7. Quality & Risk Controls

   * Honeypot detection
   * Keyword stuffing checks
   * Experience consistency validation

